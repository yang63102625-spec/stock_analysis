# Volume Breakout Strategy / 放量突破
# v2: Added false breakout filter, breakout quality scoring, post-breakout confirmation

name: volume_breakout
display_name: 放量突破
description: 检测放量突破阻力位信号。包含假突破过滤、突破质量评级和突破后回踩确认机制。
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **放量突破（Volume Breakout Strategy v2）**

  核心逻辑：价格在放大量能配合下突破关键阻力位，是趋势加速的信号。关键在于区分真突破与假突破。

  ## 0. 市场环境预判（前置过滤）
  - **进攻环境**（指数多头排列）→ 突破信号正常执行。
  - **震荡环境** → 突破有效但仓位建议减半，需次日确认。
  - **防守环境**（指数空头排列）→ 突破可靠性大幅降低，评分上限 60。

  ## 1. 阻力位识别
  使用 `analyze_trend` → resistance_levels 和 `get_daily_history`：
  - **关键阻力**：20~60 日内至少 2 次触碰但未突破的高点。
  - **前高阻力**：近期最高价。
  - **整数关口**：心理价位（如 10 元、50 元、100 元整数位）。
  - 阻力位可信度：触碰次数越多（≥3 次），阻力越有效，突破后的意义也越大。

  ## 2. 突破量能标准（分级）

  | 量能级别 | 条件 | 突破可信度 |
  |----------|------|------------|
  | **强放量** | 当日量 > 5 日均量 × 3.0，量比 > 3.0 | 高 |
  | **标准放量** | 当日量 > 5 日均量 × 2.0，量比 ≥ 2.0 | 中（新最低门槛） |
  | **弱放量** | 当日量 > 5 日均量 × 1.5，量比 1.5~2.0 | 不达标，已被参数过滤 |
  | **量能不足** | 当日量 < 5 日均量 × 1.5 | 不构成放量突破 |

  ## 3. 价格确认（突破质量评级）
  收盘后评估突破质量：

  **A 级突破（最可靠）：**
  - 收盘价站上阻力位 2% 以上
  - 收盘在当日振幅上半部（强势收盘）
  - 标准放量以上

  **B 级突破（需确认）：**
  - 收盘价站上阻力位但幅度 <2%
  - 或收盘在振幅中部
  - 次日开盘仍在阻力位上方 → 确认有效

  **C 级（假突破嫌疑）：**
  - 盘中突破但收盘跌回阻力位下方
  - 或突破后出现长上影线（上影线 > 实体 2 倍）
  - → 直接判定为假突破，不做多

  ## 4. 假突破过滤（关键改进）
  以下任一条件满足，判定为假突破风险：
  - ❌ 量能不足（量比 < 2.0）
  - ❌ 收盘跌回阻力位以内
  - ❌ 长上影线（上影线/实体 > 2）
  - ❌ 尾盘跳水（最后 30 分钟跌幅 > 日内涨幅的 50%）
  - ❌ 突破日换手率 < 1%（无资金参与）

  ## 5. 突破后操作
  - **首日突破**：可试探性建仓（1/3 仓位），止损阻力位下方 3%。
  - **次日确认**：开盘仍在阻力位上方 → 加仓至标准仓位。
  - **回踩确认**（最佳买点）：突破后回踩阻力位（原阻力变支撑）不跌破 + 缩量 → 高确定性加仓点。
  - **目标价估算**：突破位 + 前期箱体高度（等距测量）。

  ## 6. 风险过滤
  - 通过 `search_stock_news` 检查无重大利空。
  - 突破日乖离率 > 8% → 不追高，等回踩。
  - 突破前已连续上涨 2 日以上 → 力竭突破风险，降低可信度。
  - 60 日涨幅超过 50% → 避免追高抛物线走势。

  ## 评分调整（标准化）
  | 条件 | 调整 |
  |------|------|
  | A 级突破 + 强放量 + 进攻环境 | +15 |
  | A 级突破 + 标准放量 | +12 |
  | B 级突破 + 标准放量（待次日确认） | +8 |
  | 突破后回踩确认（阻力变支撑） | +10 |
  | 弱放量突破 | +5（谨慎） |
  | 假突破（C 级）| -10 |
  | 乖离率 >8% / 连涨 5 日后突破 | -8 |
  | 市场防守环境 | 评分上限 60 |


  ## 输出格式要求
  - 使用标准 Markdown 格式，禁止使用 ASCII/Unicode 框线字符（如 ┌ ─ ┐ │ └ ┘）
  - 操作建议使用 Markdown 引用块（>）或加粗文字
  - 表格使用标准 Markdown 表格语法

